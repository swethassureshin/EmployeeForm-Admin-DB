<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Admin Dashboard - Employee List</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1f2937",
                        "background-light": "#f6f7f7",
                        "background-dark": "#16191c",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-auto min-h-screen w-full flex-col">
<div class="layout-container flex h-full grow flex-col">
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-10 py-3">
<div class="flex items-center gap-8">
<div class="flex items-center gap-4 text-primary dark:text-slate-100">
<a href="index.html" class="flex items-center gap-4 text-primary dark:text-slate-100">
  <div class="size-6 flex items-center justify-center">
    <span class="material-symbols-outlined">corporate_fare</span>
  </div>
  <h2 class="text-lg font-bold leading-tight tracking-[-0.015em]">Swetha Portal</h2>
</a>
</div>

</div>
<div class="flex flex-1 justify-end gap-4 items-center">
<label class="hidden sm:flex flex-col min-w-40 !h-10 max-w-64">
<div class="flex w-full flex-1 items-stretch rounded-lg h-full">
<div class="text-slate-500 flex border-none bg-slate-100 dark:bg-slate-800 items-center justify-center pl-4 rounded-l-lg border-r-0">
<span class="material-symbols-outlined text-sm" data-icon="search">search</span>
</div>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-0 border-none bg-slate-100 dark:bg-slate-800 focus:border-none h-full placeholder:text-slate-500 px-4 rounded-l-none border-l-0 pl-2 text-sm font-normal" placeholder="Search" value=""/>
</div>
</label>
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full size-10 border border-slate-200 dark:border-slate-700" data-alt="Corporate employee profile picture" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCoJbpaAY3gjQeEK-jj_8aMFqXAWdlcPUtPbj_SDMdEcUC17ZDLAfgaEnHr7eL2gidFfBxaMaI3Ss1Re0sz1ESqSmHP95ayuGqmabSAklKLlxm09OrnVyxoYUhIm8s3Do8HSu7_VAP_qRQBI24it-xwa--siajYD1OooQZMBYRI6IebRJhShIkHGSYUt5MMpuC4bow-8Pmu3w4C5Vu8B6d9MbjHY1B4v_JURkxOjqWJaa-anvFd4UKFTmm3pFWI_rM28_OosyWRkcOh");'></div>
</div>
</header>

<!-- Main Content Area -->
<main class="flex flex-1 justify-center py-10 px-4 md:px-8 lg:px-20">
<div class="layout-content-container flex flex-col max-w-[1200px] flex-1 gap-6">
<!-- Page Title -->
<div class="flex flex-wrap items-end justify-between gap-4">
<div class="flex flex-col gap-1">
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-extrabold tracking-tight">Employee Submissions</h1>
<p class="text-slate-500 dark:text-slate-400 text-base">Review and manage internal form submissions from the workforce.</p>
</div>
<div class="flex gap-3">
<button class="flex items-center gap-2 px-4 py-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-sm font-semibold hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors shadow-sm">
<span class="material-symbols-outlined text-[20px]">filter_list</span>
                            Filters
                        </button>
<button class="flex items-center gap-2 px-4 py-2 bg-primary text-white rounded-lg text-sm font-semibold hover:bg-slate-800 transition-all shadow-md">
<span class="material-symbols-outlined text-[20px]">download</span>
                            Export CSV
                        </button>
</div>
</div>
<!-- Data Table Container -->
<div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden">
<div class="overflow-x-auto">
<table class="w-full border-collapse text-left">
<thead>
<tr class="bg-slate-50 dark:bg-slate-800/50 border-b border-slate-200 dark:border-slate-800">
<th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">Employee Name</th>
<th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">Employee ID</th>
<th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">Department</th>
<th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">Date Submitted</th>
<th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 text-right">Action</th>
</tr>
</thead>
<tbody id="employeeTable" class="divide-y divide-slate-100 dark:divide-slate-800">

</tbody>
</table>
</div>
<!-- Pagination -->
<div class="flex items-center justify-between border-t border-slate-200 dark:border-slate-800 p-4 bg-slate-50 dark:bg-slate-800/30">
<span class="text-sm text-slate-500 dark:text-slate-400">Showing 1 to 5 of 42 entries</span>
<div class="flex items-center gap-1">
<button class="flex size-9 items-center justify-center rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-400 transition-colors">
<span class="material-symbols-outlined text-[20px]">chevron_left</span>
</button>
<button class="flex size-9 items-center justify-center text-sm font-bold bg-primary text-white rounded-lg shadow-sm">1</button>
<button id="page2"
  class="flex size-9 items-center justify-center text-sm font-medium
  text-slate-600 dark:text-slate-400 hover:bg-slate-200
  dark:hover:bg-slate-700 rounded-lg">
  2
</button>
<button class="flex size-9 items-center justify-center text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-lg">3</button>
<button class="flex size-9 items-center justify-center text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-lg">4</button>
<button class="flex size-9 items-center justify-center rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-400 transition-colors">
<span class="material-symbols-outlined text-[20px]">chevron_right</span>
</button>
</div>
</div>
</div>
<!-- SUMMARY CARDS -->
<div class="flex justify-center mt-8">

  <div class="p-4 bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 flex items-center gap-4 shadow-sm">
    <div class="p-3 bg-blue-50 dark:bg-blue-900/20 rounded-lg">
      <span class="material-symbols-outlined text-blue-600">description</span>
    </div>
    <div>
      <p class="text-xs font-bold text-slate-500 uppercase">Total Forms</p>
      <p id="totalForms" class="text-xl font-bold text-center">0</p>
    </div>
  </div>

</div>

</div>
</div>
</div>
</main>
</div>
</div>
</body>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const tableBody = document.getElementById("employeeTable");
  const totalCount = document.getElementById("totalCount");

  const employees = JSON.parse(localStorage.getItem("employees")) || [];

  totalCount.textContent = employees.length;

  tableBody.innerHTML = "";

  employees.forEach((emp, index) => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td class="px-4 py-3">${index + 1}</td>
      <td class="px-4 py-3 font-medium">${emp.name}</td>
      <td class="px-4 py-3">${emp.empId}</td>
      <td class="px-4 py-3">${emp.department}</td>
      <td class="px-4 py-3">
        <button class="text-primary font-semibold hover:underline">
          View Details
        </button>
      </td>
    `;

    tableBody.appendChild(row);
  });
});
</script>
</html>
